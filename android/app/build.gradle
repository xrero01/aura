plugins {
    id 'com.android.application'
}

android {
    namespace 'app.aura'
    compileSdk 34

    defaultConfig {
        applicationId 'app.aura'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }
    buildTypes {
        release { minifyEnabled false }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
